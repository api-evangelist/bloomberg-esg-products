aid: bloomberg-esg-products
name: Bloomberg ESG Products
description: Bloomberg ESG Products provide environmental, social, and governance
  data, analytics, and scores to help investors assess sustainability risks and opportunities.
  Bloomberg collects ESG data from thousands of companies globally, offering ESG scores,
  climate data, green bond data, and sustainable finance analytics through the Bloomberg
  Terminal and API.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
